# Live deploy compose — CI exports IMAGE, CONTAINER_NAME, ports from docs/project.yml.
# App secrets: initEnv() reads Vault (VAULT_ADDR + VAULT_READ_TOKEN from CI job env).

services:
  app:
    image: ${IMAGE}
    container_name: ${CONTAINER_NAME}
    environment:
      NODE_ENV: production
      VAULT_ADDR: http://vault:8200
      VAULT_READ_TOKEN: ${VAULT_READ_TOKEN}
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    networks:
      - mono
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"

networks:
  mono:
    external: true
    name: mono
