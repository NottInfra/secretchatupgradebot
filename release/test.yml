# Test deploy compose — CI exports IMAGE, CONTAINER_NAME, ports from docs/project.yml.
# App secrets: initEnv() reads Vault (VAULT_ADDR + VAULT_READ_TOKEN from CI job env)
# DNS: use Docker embedded resolver on mono (127.0.0.11) — do not set dns: adguard (host daemon needs IPs).

services:
  app:
    image: ${IMAGE}
    container_name: ${CONTAINER_NAME}
    environment:
      NODE_ENV: test
      VAULT_ADDR: http://vault:8200
      VAULT_READ_TOKEN: ${VAULT_READ_TOKEN}
      # GramJS MTProto only — Bot API (Telegraf) uses direct egress (Tor exits blocked by Telegram).
      TELEGRAM_SOCKS_PROXY: socks5h://whonix-socks-front:9050
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: secretchatonly-bot
    ports:
    - "${HOST_PORT}:${CONTAINER_PORT}"
    networks:
    - mono
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"

networks:
  mono:
    external: true
    name: mono
