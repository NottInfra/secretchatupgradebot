# Project manifest — remotes, deploy wiring (committed; no secrets).
# Runtime env (AUTH_HOST_BASE, tokens, observability creds, …) lives in .env.production / .env.test
# → push with cmd/apply-env-file-hashicorp → Vault secret/{staging}-{project}
# → optional CI sync: mint ci-read token → VAULT_READ_TOKEN on GitHub/GitLab
# → same step: SONAR_TOKEN from .env.* → GitHub/GitLab (CI scan only; not app runtime)
# → CI passes VAULT_READ_TOKEN; app initEnv() reads Vault at runtime

project: secretchatonly-bot
group: null

mono:
  host: 104.152.211.241
  registry: registry:5000          # compose / mono network
  registry_host: 127.0.0.1:5000  # CI build+push via host docker socket
  network: mono
  sonar_project_key: secretchatonly-bot

remotes:
  live:
    remote: origin
    url: git@github.com:NottInfra/secretchatupgradebot.git
    branch: main
    release: release/production.yml
  test:
    remote: gitlab
    url: ssh://git@gitlab.nottinfra.co.uk:2222/nottinfra-limited/secretchatupgradebot.git
    branch: develop
    release: release/test.yml

# Local source files for apply-env-file-hashicorp (gitignored)
# test: GITLAB_TOKEN in .env.test for this script's GitLab API calls (auto-created via GITLAB_ADMIN_TOKEN if missing)
env:
  live: .env.production
  test: .env.test

# Deploy wiring only — not app secrets
staging:
  live:
    registry_tag: prod
    ports:
      host: 8787
      container: 8787
  test:
    registry_tag: test
    ports:
      host: 8788
      container: 8787
