# Grafana alerting rules for secretchatonly-bot (Mimir)
# Apply via Grafana provisioning on mono or recreate in UI.
# Datasource UID: mimir

apiVersion: 1
groups:
  - orgId: 1
    name: secretchatonly-bot
    folder: secretchatonly-bot
    interval: 1m
    rules:
      - uid: scb-onboarding-failures-high
        title: secretchatonly-bot onboarding failures high
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: mimir
            model:
              expr: sum(rate(analytics_events_total{event="onboarding_failed"}[15m]))
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: Onboarding failure rate elevated
          description: analytics_events_total{event="onboarding_failed"} rate > 0.05/s over 15m window
        labels:
          service: secretchatonly-bot
          severity: warning

      - uid: scb-no-analytics-events-test
        title: secretchatonly-bot no analytics events (test)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 1200
              to: 0
            datasourceUid: mimir
            model:
              expr: sum(rate(analytics_events_total{deployment_environment="test"}[5m]))
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [0]
                    type: lte
              refId: C
        noDataState: Alerting
        execErrState: Alerting
        for: 20m
        annotations:
          summary: No analytics events from test deploy
          description: Zero analytics_events_total rate for 20m — app or OTEL pipeline may be down
        labels:
          service: secretchatonly-bot
          environment: test
          severity: critical

      - uid: scb-moderation-decisions-absent
        title: secretchatonly-bot no moderation decisions
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 7200
              to: 0
            datasourceUid: mimir
            model:
              expr: sum(increase(analytics_events_total{event="moderation_decision",deployment_environment="test"}[2h]))
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [0]
                    type: lte
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 2h
        annotations:
          summary: No moderation decisions in 2h
          description: Business automation path may not be receiving DMs
        labels:
          service: secretchatonly-bot
          severity: warning
