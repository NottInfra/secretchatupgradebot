stages:
  - build
  - scan
  - sonar
  - deploy

variables:
  VAULT_ADDR: http://vault:8200
  GIT_DEPTH: "0"

# docker:24 (runner default) is Alpine — release/*.sh need bash.
default:
  before_script:
    - apk add --no-cache bash

.build_rules: &build_rules
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"

build:
  stage: build
  tags: [self-hosted, test]
  <<: *build_rules
  script:
    - bash ./release/steps/build.sh test

trivy:
  stage: scan
  tags: [self-hosted, test]
  needs: [build]
  <<: *build_rules
  script:
    - bash ./release/steps/trivy.sh test

unit-test:
  stage: scan
  image: node:22-alpine
  tags: [self-hosted, test]
  needs: [build]
  <<: *build_rules
  before_script:
    - apk add --no-cache bash make
  script:
    - bash ./release/steps/unit-test.sh test
  artifacts:
    paths:
      - coverage/
    expire_in: 1 day

sonar:
  stage: sonar
  image: sonarsource/sonar-scanner-cli:11.5
  tags: [self-hosted, test]
  needs: [build, unit-test]
  <<: *build_rules
  variables:
    SONAR_HOST_URL: http://sonarqube:9000
  before_script: []
  script:
    - bash ./release/steps/sonar.sh test

sentrux:
  stage: sonar
  tags: [self-hosted, test]
  needs: [build, unit-test]
  <<: *build_rules
  script:
    - bash ./release/steps/sentrux.sh test

deploy:
  stage: deploy
  tags: [self-hosted, test]
  needs: [build, trivy, sonar, sentrux]
  <<: *build_rules
  script:
    - bash ./release/steps/deploy.sh test
